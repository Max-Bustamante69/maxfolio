<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background gradient feel -->
  <rect width="32" height="32" fill="#1a1a1a"/>
  
  <!-- Split design - half luxury, half brutalist -->
  <path d="M0 0 L32 0 L0 32 Z" fill="#FAF8F5"/>
  
  <!-- Gold accent for luxury side -->
  <path d="M4 4 L4 12 M4 4 L12 4" stroke="#C9A962" stroke-width="2" fill="none"/>
  
  <!-- Red accent for brutalist side -->
  <rect x="20" y="20" width="8" height="8" fill="#dc2626"/>
  
  <!-- Initials centered -->
  <text x="16" y="19" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="600" fill="#1a1a1a">MB</text>
</svg>
