<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Main red square -->
  <rect width="32" height="32" fill="#dc2626"/>
  
  <!-- Offset square effect -->
  <rect x="2" y="2" width="28" height="28" fill="none" stroke="#fafaf9" stroke-width="1" opacity="0.3"/>
  
  <!-- Stacked initials -->
  <text x="16" y="14" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#fafaf9">M</text>
  <text x="16" y="26" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#fafaf9">B</text>
</svg>
